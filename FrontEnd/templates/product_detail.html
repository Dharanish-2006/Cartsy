{% load static %}{% extends "base.html" %} {% block content %}

<div class="container mt-5">
  <div class="row">
    <!-- Carousel Container -->
    <div class="col-md-6">
      <div id="carousel-container" class="shadow rounded"></div>
    </div>

    <!-- Product Info -->
    <div class="col-md-6">
      <h2 class="fw-bold">{{ product.product_name }}</h2>
      <p class="text-muted fs-4">₹{{ product.price }}</p>
      <p class="mt-3">{{ product.description }}</p>

      {% if product.is_in_stock %}
        <span class="badge bg-success">In Stock</span>
      {% else %}
        <span class="badge bg-danger">Out of Stock</span>
      {% endif %}

      <form method="post" action="{% url 'cart' %}" class="mt-4">
        {% csrf_token %}
        <input type="hidden" name="product_id" value="{{ product.id }}" />
        <button type="submit" class="btn btn-success btn-lg rounded-pill" {% if not product.is_in_stock %}disabled{% endif %}>
          <i class="bi bi-cart-plus"></i> Add to Cart
        </button>
      </form>
    </div>
  </div>
</div>

<!-- Product data for carousel initialization -->
<script>
  window.productData = {
    id: {{ product.id }},
    product_name: "{{ product.product_name }}",
    price: {{ product.price }},
    images: [
      {% for img in images %}
        {
          id: {{ img.id }},
          image: "{{ img.image.url }}",
          order: {{ img.order }}
        }{{ forloop.last|yesno:",," }}
      {% endfor %}
    ]
  };
</script>

<!-- Carousel Component Script -->
<script src="{% static 'js/carousel.js' %}"></script>

{% endblock %}
